name: Keep Streamlit App Warm

# Pings the Streamlit Community Cloud app on a schedule so it doesn't sleep,
# avoiding the cold-start delay for visitors. Independent of everything else.
# Note: hitting the /_stcore/health endpoint registers activity; if Streamlit
# changes its sleep logic this may need revisiting.

on:
  schedule:
    - cron: '*/10 * * * *'   # every 10 minutes
  workflow_dispatch:

# Avoid piling up overlapping runs if one is slow.
concurrency:
  group: keep-warm
  cancel-in-progress: true

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - name: Ping Streamlit app
        run: |
          APP="https://rfp-digest.streamlit.app"
          echo "Pinging $APP"
          # Streamlit Community Cloud bounces every visitor through an anonymous
          # session-cookie bootstrap (/-/auth/app) before serving the app. We
          # must carry cookies and follow redirects, otherwise the request loops
          # on the auth hop and never reaches (or warms) the app.
          CJ="$(mktemp)"
          code=$(curl -sS -L --max-redirs 10 -c "$CJ" -b "$CJ" --max-time 50 \
                   -o /dev/null -w "%{http_code}" "$APP/_stcore/health" || echo "000")
          echo "health (with session): $code"
          if [ "$code" = "200" ]; then
            echo "App is warm and responding."
          else
            echo "::warning::App did not return 200 (got $code). It may be waking up or redeploying."
          fi
